name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # 创建 Release、上传产物所需

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,  goarch: amd64, goarm: '' }   # 群晖/威联通 x86_64
          - { goos: linux,  goarch: arm64, goarm: '' }   # ARM64 NAS / 树莓派
          - { goos: linux,  goarch: arm,   goarm: '7' }  # 老 ARMv7 NAS
          - { goos: darwin, goarch: amd64, goarm: '' }   # Intel Mac
          - { goos: darwin, goarch: arm64, goarm: '' }   # Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: build
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          NAME=babynas-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm }}
          go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o "$NAME" .
          # 打包：附带 README 与 LICENSE
          tar -czf "${NAME}.tar.gz" "$NAME" README.md LICENSE
          echo "ASSET=${NAME}.tar.gz" >> "$GITHUB_ENV"

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
