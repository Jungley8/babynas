<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>戳泡泡</title>
<style>
  *{margin:0;padding:0;-webkit-tap-highlight-color:transparent;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:linear-gradient(160deg,#A1C4FD,#C2E9FB);
    user-select:none;-webkit-user-select:none;touch-action:none}
  #home{position:fixed;top:calc(env(safe-area-inset-top) + 10px);left:14px;z-index:10;
    width:44px;height:44px;border:none;border-radius:50%;background:rgba(255,255,255,.7);
    font-size:22px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.15)}
  .bubble{position:absolute;border-radius:50%;pointer-events:none;
    background:radial-gradient(circle at 32% 30%,rgba(255,255,255,.9),rgba(255,255,255,.15) 60%,rgba(255,255,255,0));
    border:2px solid rgba(255,255,255,.5)}
  .pop{animation:pop .35s ease-out forwards}
  @keyframes pop{to{transform:scale(1.6);opacity:0}}
</style>
</head>
<body>
<button id="home" onclick="location.href='/'">←</button>
<script>
let AC;
function tone(){
  AC = AC || new (window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended')AC.resume();
  const o=AC.createOscillator(),g=AC.createGain(),t=AC.currentTime;
  o.type='sine';
  o.frequency.setValueAtTime(700+Math.random()*900,t);
  o.frequency.exponentialRampToValueAtTime(200,t+0.18);
  o.connect(g);g.connect(AC.destination);
  g.gain.setValueAtTime(0.4,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
  o.start(t);o.stop(t+0.25);
}
const COLORS=['#FF8FB1','#FFD66B','#7FD8BE','#9DB8FF','#C49BFF','#FFA07A'];
function spawn(x,y){
  const s=60+Math.random()*70;
  const b=document.createElement('div');
  b.className='bubble';
  b.style.cssText=`width:${s}px;height:${s}px;left:${x-s/2}px;top:${y-s/2}px;background-color:${COLORS[Math.random()*COLORS.length|0]}`;
  document.body.appendChild(b);
  requestAnimationFrame(()=>b.classList.add('pop'));
  b.addEventListener('animationend',()=>b.remove());
  tone();
  if(navigator.vibrate)navigator.vibrate(20);
}
function handle(e){
  e.preventDefault();
  const pts=e.touches?e.touches:[e];
  for(const p of pts)spawn(p.clientX,p.clientY);
}
document.body.addEventListener('touchstart',handle,{passive:false});
document.body.addEventListener('mousedown',handle);
</script>
</body>
</html>
